services:
  database:
    image: mysql:latest
    container_name: elivate_mysql_dev_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: elivate_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306" # change the first port if your computer already use this port.
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: